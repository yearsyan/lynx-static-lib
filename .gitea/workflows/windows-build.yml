name: Windows build

on:
  push:
    tags:
      - "*"

jobs:
  conan-static-library:
    runs-on: windows
    timeout-minutes: 240

    steps:
      - name: Checkout
        shell: powershell
        env:
          CHECKOUT_TOKEN: ${{ github.token }}
          GITEA_CHECKOUT_TOKEN: ${{ gitea.token }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          $ErrorActionPreference = 'Stop'

          $token = if ($env:CHECKOUT_TOKEN) { $env:CHECKOUT_TOKEN } else { $env:GITEA_CHECKOUT_TOKEN }
          if (-not $token) {
            throw 'No workflow checkout token was provided by Gitea.'
          }

          $repoUrl = "$($env:SERVER_URL)/$($env:REPOSITORY).git"
          $encoded = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$token"))
          $authHeader = "Authorization: Basic $encoded"

          git init .
          if ((git remote) -contains 'origin') {
            git remote remove origin
          }
          git remote add origin $repoUrl
          if ($env:REF -and $env:REF.StartsWith('refs/tags/')) {
            git -c "http.extraHeader=$authHeader" fetch --depth 1 origin "+$($env:REF):$($env:REF)"
          } else {
            git -c "http.extraHeader=$authHeader" fetch --depth 1 origin $env:SHA
          }
          git checkout --force FETCH_HEAD
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Check committed files
        shell: powershell
        run: python .\scripts\check_repository.py

      - name: Ensure Windows LLVM toolchain
        shell: powershell
        run: python .\scripts\ensure_windows_toolchain.py

      - name: Install Conan
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          python -m pip install --upgrade pip conan
          $conanScripts = @(
            python -c "import sysconfig; print(sysconfig.get_path('scripts'))"
            python -c "import sysconfig; print(sysconfig.get_path('scripts', scheme='nt_user'))"
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique
          $env:PATH = "$($conanScripts -join ';');$env:PATH"
          conan --version

      - name: Configure Conan remote
        shell: powershell
        env:
          CONAN_REMOTE_URL: ${{ secrets.CONAN_REMOTE_URL }}
          CONAN_USERNAME: ${{ secrets.CONAN_USERNAME }}
          CONAN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          $conanScripts = @(
            python -c "import sysconfig; print(sysconfig.get_path('scripts'))"
            python -c "import sysconfig; print(sysconfig.get_path('scripts', scheme='nt_user'))"
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique
          $env:PATH = "$($conanScripts -join ';');$env:PATH"
          conan --version

          if ($env:CONAN_REMOTE_URL) {
            conan remote add neuyan $env:CONAN_REMOTE_URL --force
          }

          if ($env:CONAN_USERNAME -and $env:CONAN_PASSWORD) {
            conan remote login neuyan $env:CONAN_USERNAME -p $env:CONAN_PASSWORD
          }

      - name: Configure CMake
        shell: powershell
        run: python .\scripts\invoke_cmake.py --preset windows

      - name: Sync official Lynx dependencies
        shell: powershell
        run: python .\scripts\invoke_cmake.py --build --preset deps

      - name: Build static library
        shell: powershell
        run: python .\scripts\invoke_cmake.py --build --preset static

      - name: Upload stripped Conan library package
        shell: powershell
        env:
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $conanScripts = @(
            python -c "import sysconfig; print(sysconfig.get_path('scripts'))"
            python -c "import sysconfig; print(sysconfig.get_path('scripts', scheme='nt_user'))"
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique
          $env:PATH = "$($conanScripts -join ';');$env:PATH"

          $tagName = $env:REF_NAME
          if (-not $tagName -and $env:REF -and $env:REF.StartsWith('refs/tags/')) {
            $tagName = $env:REF.Substring('refs/tags/'.Length)
          }
          if (-not $tagName) {
            $tagName = (git describe --tags --exact-match).Trim()
          }

          $version = $tagName -replace '^v', ''
          if (-not $version) {
            throw "Could not derive Conan package version from tag '$tagName'."
          }

          $packageArgs = @(
            '.\scripts\package_conan.py',
            '--skip-build',
            '--upload',
            '--force',
            '--library-only',
            '--version',
            $version,
            '--user',
            'neuyan',
            '--channel',
            'stable',
            '--remote',
            'neuyan'
          )
          python @packageArgs
