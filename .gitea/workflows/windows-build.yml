name: Windows build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static-demo:
    runs-on: windows
    timeout-minutes: 240

    steps:
      - name: Checkout
        shell: powershell
        env:
          CHECKOUT_TOKEN: ${{ github.token }}
          GITEA_CHECKOUT_TOKEN: ${{ gitea.token }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          SHA: ${{ github.sha }}
        run: |
          $ErrorActionPreference = 'Stop'

          $token = if ($env:CHECKOUT_TOKEN) { $env:CHECKOUT_TOKEN } else { $env:GITEA_CHECKOUT_TOKEN }
          if (-not $token) {
            throw 'No workflow checkout token was provided by Gitea.'
          }

          $repoUrl = "$($env:SERVER_URL)/$($env:REPOSITORY).git"
          $encoded = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:$token"))
          $authHeader = "Authorization: Basic $encoded"

          git init .
          if ((git remote) -contains 'origin') {
            git remote remove origin
          }
          git remote add origin $repoUrl
          git -c "http.extraHeader=$authHeader" fetch --depth 1 origin $env:SHA
          git checkout --force FETCH_HEAD
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Check committed files
        shell: powershell
        run: python .\scripts\check_repository.py

      - name: Ensure Windows LLVM toolchain
        shell: powershell
        run: python .\scripts\ensure_windows_toolchain.py

      - name: Configure CMake
        shell: powershell
        run: python .\scripts\invoke_cmake.py --preset windows

      - name: Sync official Lynx dependencies
        shell: powershell
        run: python .\scripts\invoke_cmake.py --build --preset deps

      - name: Build static demo
        shell: powershell
        run: python .\scripts\invoke_cmake.py --build --preset demo

      - name: Verify static link and smoke test
        shell: powershell
        run: python .\scripts\verify_demo.py
